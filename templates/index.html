
<!DOCTYPE html>
<html>
<head>
    <title>Calculator App</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            margin: 5px;
            width: 100px;
        }
        button {
            padding: 10px;
            margin: 5px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>
<body>

    <h1>Calculator App</h1>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <br>

    <button onclick="calculate('add')">Add</button>
    <button onclick="calculate('sub')">Subtract</button>
    <button onclick="calculate('mul')">Multiply</button>
    <button onclick="calculate('div')">Divide</button>

    <div id="result"></div>

    <script>
        function calculate(operation) {
            let a = document.getElementById("num1").value;
            let b = document.getElementById("num2").value;

            if (!a || !b) {
                document.getElementById("result").innerText = "Please enter both numbers";
                return;
            }

            fetch(`/${operation}?a=${a}&b=${b}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById("result").innerText = data.error;
                    } else {
                        document.getElementById("result").innerText = "Result: " + data.result;
                    }
                })
                .catch(err => {
                    document.getElementById("result").innerText = "Error occurred";
                });
        }
    </script>

</body>
</html>
